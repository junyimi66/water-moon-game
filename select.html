<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>选择角色 - 水月巡游</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2 style="text-align:center;">选择你的罪人角色</h2>
    <div id="characterGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:24px;"></div>
  </div>
  <script>
    // 12个罪人角色卡片
    const grid = document.getElementById('characterGrid');
    // 技能数据
    const skills = [
      {
        name: '浓烈叠涂',
        desc: `造成11点伤害\n攻击1次。`,
        icon: '🩸',
        color: '#1ec6e6',
        border: '#1ec6e6',
        tag: 'SKILL 1'
      },
      {
        name: '原色表现',
        desc: `造成14点伤害\n攻击2次。`,
        icon: '🟣',
        color: '#a86cff',
        border: '#a86cff',
        tag: 'SKILL 2'
      },
      {
        name: '野兽派·暴烈呈现',
        desc: `造成21点伤害\n攻击3次。`,
        icon: '🟧',
        color: '#ff8c2a',
        border: '#ff8c2a',
        tag: 'SKILL 3'
      }
    ];

    function showCharacterDetail(idx) {
      // 创建弹窗
      let modal = document.getElementById('charModal');
      if (!modal) {
        modal = document.createElement('div');
        modal.id = 'charModal';
        modal.className = 'modal';
        modal.innerHTML = `<div class='modal-content' style='max-width:600px;padding:0;'>
          <div id='charDetail'></div>
          <button style='margin:16px auto 8px auto;display:block;' onclick="document.getElementById('charModal').classList.add('hidden')">关闭</button>
        </div>`;
        document.body.appendChild(modal);
      }
      // 填充内容
      const detail = document.getElementById('charDetail');
      // 角色名、编号、阵营
      let charName = `罪人${idx}号`;
      let camp = '野兽派';
      let illu = `<div style='width:140px;height:260px;background:#222;border-radius:16px;box-shadow:0 2px 12px #0008;display:flex;align-items:center;justify-content:center;overflow:hidden;'><span style='color:#555;font-size:13px;'>立绘待补充</span></div>`;
      if(idx>=1 && idx<=12){
        illu = `<div style='width:140px;height:260px;background:#222;border-radius:16px;box-shadow:0 2px 12px #0008;overflow:hidden;display:flex;align-items:center;justify-content:center;'><img src='assets/char${idx}.png' alt='罪人${idx}' style='width:100%;height:100%;object-fit:cover;image-rendering:pixelated;'/></div>`;
      }
      // 技能卡竖排
      const skillCards = skills.map((s,i)=>`
        <div style='width:170px;max-width:90vw;background:#181818;border-radius:10px;margin:10px 0 0 0;border-left:6px solid ${s.border};box-shadow:0 2px 8px #0006;'>
          <div style='display:flex;align-items:center;gap:10px;padding:10px 10px 0 10px;'>
            <div style='width:48px;height:48px;background:#222;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:32px;border:2px solid ${s.border};'>
              <span>${s.icon}</span>
            </div>
            <div>
              <b style='font-size:1em;color:${s.color};'>${s.name}</b><br>
              <span style='font-size:12px;color:#888;'>${s.tag}</span>
            </div>
          </div>
          <div style='margin:8px 0 8px 0;white-space:pre-line;color:#fff;font-size:12px;padding:0 10px 10px 10px;'>${s.desc}</div>
        </div>
      `).join('');
      detail.innerHTML = `
        <div style='display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start;justify-content:center;'>
          <div style='flex:0 0 140px;'>${illu}</div>
          <div style='flex:1 1 220px;min-width:180px;'>
            <div style='margin-bottom:10px;'>
              <span style='font-size:1.1em;color:#ffe066;font-weight:bold;'>${charName}</span>
              <span style='font-size:0.95em;color:#ff8c2a;margin-left:10px;'>${camp}</span>
            </div>
            <div>${skillCards}</div>
          </div>
        </div>
      `;
      modal.classList.remove('hidden');
    }
    for(let i=1;i<=12;i++){
      const card = document.createElement('div');
      card.className = 'player-card';
      card.style.cursor = 'pointer';
      card.innerHTML = `
        <b>罪人${i}号</b><br>
        <span style='font-size:12px;color:#888'></span><br>
        <span class='mc-char-wrap' style='display:inline-block;width:40px;height:40px;margin-top:4px;'>
          <img class='mc-char' src='assets/char${i}.png' style='width:40px;height:40px;image-rendering:pixelated;border-radius:6px;background:#111;'/>
        </span>
      `;
      card.onclick = ()=>showCharacterDetail(i);
      grid.appendChild(card);
    }
    // 简单像素小人动画
    setInterval(()=>{
      document.querySelectorAll('.mc-char').forEach((img,idx)=>{
        img.style.transform = `translateY(${Math.sin(Date.now()/300+idx)*2}px)`;
      });
    }, 60);
  </script>
  <script src="hotreload.js"></script>
</body>
</html>
